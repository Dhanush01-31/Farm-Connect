{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card shadow">

        <div class="card-header bg-success text-white">
            <h3>Add Product</h3>
        </div>

        <div class="card-body">

            <form method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    class="btn btn-success"
                    type="submit">

                    Save Product

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
