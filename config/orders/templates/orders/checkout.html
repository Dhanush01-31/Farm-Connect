{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-success text-white">

                    <h3>
                        Checkout
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Full Name

                            </label>

                            <input
                                type="text"
                                name="full_name"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Phone Number

                            </label>

                            <input
                                type="text"
                                name="phone"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Delivery Address

                            </label>

                            <textarea
                                name="address"
                                class="form-control"
                                rows="4"
                                required>
                            </textarea>

                        </div>

                        <div class="text-end">

                            <h4>

                                Total:
                                ₹{{ total }}

                            </h4>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success w-100 mt-3">

                            Place Order

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
