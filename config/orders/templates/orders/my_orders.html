{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">

        My Orders

    </h2>

    <table class="table table-bordered">

        <thead class="table-success">

            <tr>

                <th>Order ID</th>

                <th>Total Amount</th>

                <th>Status</th>

                <th>Date</th>

            </tr>

        </thead>

        <tbody>

            {% for order in orders %}

            <tr>

                <td>

                    #{{ order.id }}

                </td>

                <td>

                    ₹{{ order.total_amount }}

                </td>

                <td>

                    <span class="badge bg-primary">

                        {{ order.status }}

                    </span>

                </td>

                <td>

                    {{ order.created_at }}

                </td>

            </tr>

            {% empty %}

            <tr>

                <td colspan="4" class="text-center">

                    No Orders Found

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
