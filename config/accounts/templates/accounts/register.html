{% extends 'base.html' %}

{% block content %}

<style>

    .register-container{

        min-height:85vh;

        display:flex;
        justify-content:center;
        align-items:center;

        background:
        linear-gradient(
            rgba(0,0,0,0.45),
            rgba(0,0,0,0.45)
        ),
        url("https://images.unsplash.com/photo-1500937386664-56d1dfef3854");

        background-size:cover;
        background-position:center;

        border-radius:20px;

        animation:fadeIn 1s ease;
    }

    .register-card{

        width:100%;
        max-width:550px;

        backdrop-filter:blur(15px);

        background:rgba(255,255,255,0.15);

        border:1px solid rgba(255,255,255,0.2);

        border-radius:20px;

        padding:40px;

        color:white;

        box-shadow:
        0 8px 32px rgba(0,0,0,0.3);

        animation:slideUp 1s ease;
    }

    .register-icon{

        text-align:center;

        font-size:60px;

        margin-bottom:15px;

        animation:float 3s infinite ease-in-out;
    }

    .register-title{

        text-align:center;

        font-size:32px;

        font-weight:bold;

        margin-bottom:10px;
    }

    .register-subtitle{

        text-align:center;

        margin-bottom:30px;

        color:#f5f5f5;
    }

    form p{

        margin-bottom:18px;
    }

    form label{

        display:block;

        margin-bottom:8px;

        font-weight:600;
    }

    form input,
    form select{

        width:100%;

        padding:12px;

        border:none;

        border-radius:10px;

        outline:none;

        background:rgba(255,255,255,0.9);

        transition:0.3s;
    }

    form input:focus,
    form select:focus{

        transform:scale(1.02);

        box-shadow:
        0 0 12px rgba(255,255,255,0.8);
    }

    .register-btn{

        width:100%;

        padding:14px;

        border:none;

        border-radius:10px;

        background:#28a745;

        color:white;

        font-size:18px;

        font-weight:bold;

        transition:0.3s;
    }

    .register-btn:hover{

        background:#1f8a37;

        transform:translateY(-3px);

        box-shadow:
        0 10px 20px rgba(0,0,0,0.3);
    }

    .login-link{

        text-align:center;

        margin-top:20px;
    }

    .login-link a{

        color:#ffd43b;

        text-decoration:none;

        font-weight:bold;
    }

    .login-link a:hover{

        text-decoration:underline;
    }

    @keyframes fadeIn{

        from{
            opacity:0;
        }

        to{
            opacity:1;
        }
    }

    @keyframes slideUp{

        from{
            opacity:0;
            transform:translateY(50px);
        }

        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    @keyframes float{

        0%{
            transform:translateY(0);
        }

        50%{
            transform:translateY(-10px);
        }

        100%{
            transform:translateY(0);
        }
    }

</style>

<div class="register-container">

    <div class="register-card">

        <div class="register-icon">
            🌾
        </div>

        <h2 class="register-title">
            Create Account
        </h2>

        <p class="register-subtitle">
            Join FarmConnect and start growing your agricultural business.
        </p>

        <form method="POST">

            {% csrf_token %}
            {% if form.errors %}
            <div class="alert alert-danger">
                {{ form.errors }}
            </div>
            {% endif %}

            {{ form.as_p }}

            <button
                type="submit"
                class="register-btn">

                Register
            </button>

        </form>

        <div class="login-link">

            Already have an account?

            <a href="{% url 'login' %}">
                Login Here
            </a>

        </div>

    </div>

</div>

{% endblock %}
